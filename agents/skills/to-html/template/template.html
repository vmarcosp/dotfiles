<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}}</title>

  <!-- 1. Tailwind Play CDN (must load before the inline config below). -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 2. Palette + tokens. Must be INLINE and AFTER the CDN script — Play CDN
       only picks the config up via a synchronous inline assignment. -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#FAFAFA',
            ink: '#0A0A0A',
            pink: { DEFAULT: '#F8C8D8', soft: '#FDE7EE' },
            mint: '#C8E6D0',
            butter: '#FCE8B2',
            blush: '#F5C2C2',
            gray: {
              100: '#F2F2F2',
              300: '#D6D6D6',
              500: '#8A8A8A',
              700: '#3A3A3A',
            },
          },
          fontFamily: {
            serif: ['ui-serif', 'Georgia', "'Times New Roman'", 'serif'],
            sans:  ['system-ui', '-apple-system', "'Segoe UI'", 'Roboto', 'sans-serif'],
            mono:  ['ui-monospace', "'SF Mono'", 'Menlo', 'Monaco', 'monospace'],
          },
          fontSize: {
            // Body baseline: 14.5px / 1.6 line-height. All prose inherits this.
            base: ['14.5px', { lineHeight: '1.6' }],
            sm:   ['13.5px', { lineHeight: '1.55' }],
            xs:   ['12px',   { lineHeight: '1.5' }],
          },
          maxWidth: { page: '1120px' },
        },
      },
    };
  </script>

  <!-- 3. Framework: th-* primitive classes + Alpine components. -->
  <link rel="stylesheet" href="file:///Users/marcosoliveira/.claude/skills/to-html/template/to-html.css" />
  <script src="file:///Users/marcosoliveira/.claude/skills/to-html/template/to-html.js"></script>

  <!-- 4. Alpine.js + collapse plugin (defer; collapse must load before alpinejs). -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- 5. highlight.js auto-detect. Theme tokens live in to-html.css. -->
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>
</head>
<body class="bg-paper font-sans">
  <main class="th-body max-w-page mx-auto px-8 py-14 pb-32">

    <header class="mb-12 max-w-[820px]">
      <div class="uppercase tracking-widest text-xs text-gray-500 mb-3">{{EYEBROW}}</div>
      <h1 class="th-h1 mb-4">{{TITLE}}</h1>
      <p class="th-lede mb-5">{{ONE_SENTENCE_HEADLINE}}</p>
      <div x-data="promptBox" class="th-prompt-box">
        <span class="th-prompt-label">From prompt</span>
        {{PROMPT_TEXT}}
      </div>
    </header>

    <!-- Body goes here. Pick an archetype from template/archetypes/ and
         paste its body markup in this position. See SKILL.md. -->

    <footer class="th-provenance">
      Generated by /to-html from {{SOURCE_FILES}} on {{DATE}}.
    </footer>
  </main>
</body>
</html>
